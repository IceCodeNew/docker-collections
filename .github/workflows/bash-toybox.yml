name: bash-toybox Image CI
permissions: {}

on:
  push:
    branches:
    - 'master'
    paths:
    - '.github/workflows/bash-toybox.yml'
    - 'bash-toybox/Dockerfile'
    - 'bash-toybox/debian12.Dockerfile'
  schedule:
  - cron: "20 10 1-31/10 * *"
  workflow_dispatch:

jobs:
  bash-toybox:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and load the latest variant to local daemon
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: "{{defaultContext}}:bash-toybox"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:latest
      -
        name: Smoke Test
        env:
          registry_repo: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox
        run: |
          docker save -o "bash-toybox.tar" "${registry_repo}:latest"
      -
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: "{{defaultContext}}:bash-toybox"
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:latest \
              | grep -Po '[^ \r\n\t\v]+@sha256:[a-z0-9]+' | xargs -r -t -n 1 docker buildx imagetools inspect --raw
      -
        name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: "bash-toybox.tar"
          format: 'table'

  bash-toybox-debian12:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and load the latest variant to local daemon
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: "{{defaultContext}}:bash-toybox"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: "./debian12.Dockerfile"
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:debian12
      -
        name: Smoke Test
        env:
          registry_repo: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox
        run: |
          docker save -o "bash-toybox.tar" "${registry_repo}:debian12"
      -
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: "{{defaultContext}}:bash-toybox"
          push: true
          platforms: linux/amd64,linux/arm64
          file: "./debian12.Dockerfile"
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:debian12
          cache-from: type=gha
          cache-to: type=gha,mode=max

      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ secrets.DOCKERHUB_USERNAME }}/bash-toybox:debian12 \
              | grep -Po '[^ \r\n\t\v]+@sha256:[a-z0-9]+' | xargs -r -t -n 1 docker buildx imagetools inspect --raw
      -
        name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: "bash-toybox.tar"
          format: 'table'
